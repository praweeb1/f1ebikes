<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Transition prototypes - F1 Ebikes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800&display=swap" rel="stylesheet" />
<link rel="icon" type="image/png" href="Images/F2.png" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #0a0a0a;
    color: #fff;
    font-family: "Archivo", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    padding: 28px 16px 40px;
  }
  h1 { font-size: 1.05rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; }
  h1 span { color: #e02b1e; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 980px; }
  .chip {
    font: 600 0.78rem "Archivo", sans-serif;
    color: rgba(255,255,255,0.8);
    background: #161616;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 999px;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .chip:hover { border-color: rgba(255,255,255,0.4); }
  .chip.on { background: #e02b1e; border-color: #e02b1e; color: #fff; }
  .desc { font-size: 0.82rem; color: rgba(255,255,255,0.55); max-width: 760px; text-align: center; min-height: 2.4em; }

  /* ---- the miniature hero stage ---- */
  .stage-wrap { position: relative; }
  .stage {
    position: relative;
    width: min(960px, 92vw);
    aspect-ratio: 16 / 9;
    background: #111;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .stage > * { position: absolute; }
  .backdrop { inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; }
  .backdim { inset: 0; background: rgba(0,0,0,0.55); opacity: 0; }
  .bike { inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .storm, .ghost, .cornerglow, .stormdim { pointer-events: none; }
  .storm {
    object-fit: cover;
    mix-blend-mode: screen;
    filter: hue-rotate(178deg) saturate(1.7) brightness(0.58) contrast(2.1);
    opacity: 0;
  }
  .stormdim, .ghost, .cornerglow {
    background: radial-gradient(circle at 50% 50%,
      rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.3) 44%, rgba(0,0,0,0) 70%);
    opacity: 0;
  }
  .ghost, .cornerglow {
    background: radial-gradient(circle at 50% 50%,
      rgba(224,43,30,0.5) 0%, rgba(224,43,30,0.18) 40%, rgba(224,43,30,0) 68%);
  }
  .pip {
    object-fit: cover;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.18);
    box-shadow: 0 16px 40px rgba(0,0,0,0.5);
    opacity: 0;
  }
  .flash { inset: 0; background: radial-gradient(circle, #fff 0%, rgba(224,43,30,0.85) 45%, rgba(224,43,30,0.4) 100%); opacity: 0; }
  .bar {
    left: 0; bottom: 0; height: 3px; width: 0%;
    background: #e02b1e; border-radius: 2px;
  }
  .controls { display: flex; gap: 10px; align-items: center; }
  .btn {
    font: 700 0.8rem "Archivo", sans-serif;
    color: #fff; background: #b2261c; border: 0; border-radius: 8px;
    padding: 10px 22px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .btn:hover { background: #e02b1e; }
  .hint { font-size: 0.72rem; color: rgba(255,255,255,0.35); }
</style>
</head>
<body>
  <h1>Transition prototypes <span>/ pick one</span></h1>
  <div class="chips" id="chips"></div>
  <div class="desc" id="desc"></div>

  <div class="stage-wrap">
    <div class="stage" id="stage">
      <img class="backdrop" id="backdrop" src="assets/eb1ke-poster.jpg" alt="" />
      <div class="backdim" id="backdim"></div>
      <img class="bike" id="bike" src="assets/bike-seq-360/frame-360.jpg" alt="" />
      <div class="cornerglow" id="cornerglow"></div>
      <div class="ghost" id="ghost"></div>
      <div class="stormdim" id="stormdim"></div>
      <!-- two storm copies injected by JS after the clip blob loads -->
      <video class="pip" id="pip" muted loop playsinline preload="auto" src="Videos/tiktok-web.mp4"></video>
      <div class="flash" id="flash"></div>
      <div class="bar" id="bar"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="replay">Replay</button>
    <span class="hint">auto-replays &middot; same base timeline in every variant, only the chosen tweak differs</span>
  </div>

<script>
(function () {
  var VARIANTS = [
    { name: "0 · Current", desc: "The transition exactly as it is on the site today (miniature, time-based replay). Baseline for comparison." },
    { name: "1 · Impact flash + shake", desc: "A single ~110ms red-white flash and a 3px screen shake fire at the exact moment the bike vanishes - the lightning now CAUSES the disappearance." },
    { name: "2 · Materialize pop", desc: "The 9:16 portrait scales 0.94 → 1.03 → 1 as it appears, synced with the arrival strikes - conjured by the lightning instead of politely fading in." },
    { name: "3 · Storm field", desc: "The storm runs ~1.45× bigger through the first half and the two bolt copies are offset from each other - reads as a storm system, not one wandering spark." },
    { name: "4 · Hop afterimages", desc: "Each teleport-hop leaves a fading crimson afterglow at the previous position - the jumps read as electric re-strikes, not stutter." },
    { name: "5 · Destination glow", desc: "A faint pulsing glow marks the bottom-right corner from early in the travel - the eye knows where the lightning is headed before it lands." },
  ];
  var variant = 0;

  var stage = document.getElementById("stage");
  var els = {};
  ["backdrop","backdim","bike","cornerglow","ghost","stormdim","pip","flash","bar"].forEach(function (id) {
    els[id] = document.getElementById(id);
  });
  var storms = [];

  // chips
  var chipsBox = document.getElementById("chips");
  var desc = document.getElementById("desc");
  VARIANTS.forEach(function (v, i) {
    var b = document.createElement("button");
    b.className = "chip";
    b.textContent = v.name;
    b.addEventListener("click", function () { variant = i; sync(); replay(); });
    chipsBox.appendChild(b);
  });
  function sync() {
    [].forEach.call(chipsBox.children, function (c, i) { c.classList.toggle("on", i === variant); });
    desc.textContent = VARIANTS[variant].desc;
  }

  // load the lightning clip as a blob (dev server has no range support), two copies
  fetch("Images/Lightnting/0_Lightning_Electric_3840x2160.mp4")
    .then(function (r) { return r.blob(); })
    .then(function (b) {
      var url = URL.createObjectURL(b);
      for (var i = 0; i < 2; i++) {
        var v = document.createElement("video");
        v.className = "storm";
        v.muted = true; v.loop = true;
        v.setAttribute("playsinline", "");
        v.preload = "auto";
        v.src = url;
        stage.insertBefore(v, els.pip);
        v.load();
        var p = v.play(); if (p && p.catch) p.catch(function () {});
        storms.push(v);
      }
      storms[1].style.transform = "scaleX(-1)";
      try { storms[1].currentTime = 1.0; } catch (e) {}
      replay();
    });

  var clamp01 = function (x) { return x < 0 ? 0 : x > 1 ? 1 : x; };
  var lerp = function (a, b, t) { return a + (b - a) * t; };
  var smoother = function (t) { t = clamp01(t); return t * t * t * (t * (t * 6 - 15) + 10); };
  function jit(n, k) {
    var s = Math.sin(n * 127.1 + k * 311.7) * 43758.5453;
    return (s - Math.floor(s)) * 2 - 1;
  }

  var DUR = 3600, raf = 0, t0 = 0, lastHop = -1, ghostAt = 0, replayTimer = 0;

  function geom() {
    var W = stage.clientWidth, H = stage.clientHeight;
    var margin = Math.max(12, W * 0.02);
    var ph = H * 0.36, pw = ph * 9 / 16;
    return { W: W, H: H, pip: { l: W - pw - margin, t: H - ph - margin, w: pw, h: ph } };
  }
  function put(el, cx, cy, size, o) {
    el.style.left = (cx - size / 2) + "px";
    el.style.top = (cy - size / 2) + "px";
    el.style.width = size + "px";
    el.style.height = size + "px";
    el.style.opacity = o;
  }

  function frame(now) {
    if (!t0) t0 = now;
    var t = clamp01((now - t0) / DUR);
    var g = geom();
    var pipCx = g.pip.l + g.pip.w / 2, pipCy = g.pip.t + g.pip.h / 2;
    var pipSize = Math.max(g.pip.w, g.pip.h) * 2.2;

    els.bar.style.width = (t * 100).toFixed(1) + "%";

    // ---- bike zaps away ----
    var bikeO = 1 - clamp01((t - 0.1) / 0.09);
    els.bike.style.opacity = bikeO.toFixed(3);

    // variant 1: impact flash + shake at the vanish moment
    if (variant === 1) {
      var f = Math.exp(-Math.pow((t - 0.145) / 0.018, 2));
      els.flash.style.opacity = (f * 0.9).toFixed(3);
      var sh = t > 0.13 && t < 0.22 ? (1 - (t - 0.13) / 0.09) * 3.2 : 0;
      stage.style.transform = sh > 0.05
        ? "translate(" + (jit((t * 331) | 0, 5) * sh).toFixed(1) + "px," + (jit((t * 331) | 0, 7) * sh).toFixed(1) + "px)"
        : "none";
    } else { els.flash.style.opacity = 0; stage.style.transform = "none"; }

    // ---- backdrop rises ----
    els.backdrop.style.opacity = clamp01((t - 0.12) / 0.3).toFixed(3);
    els.backdim.style.opacity = (clamp01((t - 0.12) / 0.3) * 0.9).toFixed(3);

    // ---- storm hops to the corner ----
    var tt = smoother(clamp01((t - 0.14) / 0.6));
    var STEPS = 9;
    var n = Math.round(tt * STEPS), q = n / STEPS;
    var mid = q > 0 && q < 1 ? 1 : 0;
    var cx = lerp(g.W / 2, pipCx, q) + jit(n, 1) * g.W * 0.025 * mid;
    var cy = lerp(g.H / 2, pipCy, q) + jit(n, 2) * g.H * 0.025 * mid;
    var scaleBoost = variant === 3 ? lerp(1.45, 1, smoother(q)) : 1;
    var size = lerp(Math.min(g.W, g.H) * 1.3, pipSize, smoother(q)) * scaleBoost;
    var on = clamp01((t - 0.08) / 0.08);
    var off = clamp01((t - 0.8) / 0.05);

    // flourish: strikes around the pip at arrival
    var flourish = clamp01((t - 0.8) / 0.18);
    var o;
    if (flourish > 0) {
      cx = pipCx; cy = pipCy; size = pipSize * (variant === 3 ? 1.1 : 1);
      o = flourish < 0.7 ? 1 : 1 - (flourish - 0.7) / 0.3;
    } else {
      o = on * (1 - off);
    }
    storms.forEach(function (v, i) {
      var ox = 0, oy = 0;
      if (variant === 3 && i === 1) { ox = size * 0.16 * (1 - q); oy = -size * 0.12 * (1 - q); }
      put(v, cx + ox, cy + oy, size, o.toFixed(3));
    });
    put(els.stormdim, cx, cy, size * 1.2, (o * 0.5).toFixed(3));

    // variant 4: fading afterglow at the previous hop
    if (variant === 4) {
      if (n !== lastHop && mid && flourish === 0) {
        var pn = Math.max(0, n - 1), pq = pn / STEPS;
        var px = lerp(g.W / 2, pipCx, pq) + jit(pn, 1) * g.W * 0.025;
        var py = lerp(g.H / 2, pipCy, pq) + jit(pn, 2) * g.H * 0.025;
        put(els.ghost, px, py, size * 0.9, 0.85);
        ghostAt = now;
        lastHop = n;
      }
      var ga = clamp01(1 - (now - ghostAt) / 480);
      els.ghost.style.opacity = (0.85 * ga * (flourish > 0 ? 0 : 1)).toFixed(3);
    } else { els.ghost.style.opacity = 0; }

    // variant 5: destination glow at the corner
    if (variant === 5) {
      var gl = clamp01((t - 0.2) / 0.12) * (1 - clamp01((t - 0.78) / 0.08));
      var pulse = 0.75 + 0.25 * Math.sin(now / 180);
      put(els.cornerglow, pipCx, pipCy, pipSize * 1.25, (gl * 0.85 * pulse).toFixed(3));
    } else { els.cornerglow.style.opacity = 0; }

    // ---- portrait appears ----
    var u = clamp01((t - 0.8) / 0.12);
    els.pip.style.left = g.pip.l + "px";
    els.pip.style.top = g.pip.t + "px";
    els.pip.style.width = g.pip.w + "px";
    els.pip.style.height = g.pip.h + "px";
    els.pip.style.opacity = u.toFixed(3);
    if (variant === 2 && u > 0) {
      var s = u < 0.62 ? lerp(0.94, 1.03, smoother(u / 0.62)) : lerp(1.03, 1, smoother((u - 0.62) / 0.38));
      els.pip.style.transform = "scale(" + s.toFixed(4) + ")";
    } else { els.pip.style.transform = "none"; }

    if (t < 1) { raf = requestAnimationFrame(frame); }
    else { replayTimer = setTimeout(replay, 1400); }   // hold the end state, then loop
  }

  function replay() {
    cancelAnimationFrame(raf);
    clearTimeout(replayTimer);
    t0 = 0; lastHop = -1; ghostAt = 0;
    if (storms[0]) {
      try { storms[0].currentTime = 0; storms[1].currentTime = 1.0; } catch (e) {}
      storms.forEach(function (v) { var p = v.play(); if (p && p.catch) p.catch(function () {}); });
    }
    var pp = els.pip.play(); if (pp && pp.catch) pp.catch(function () {});
    raf = requestAnimationFrame(frame);
  }

  document.getElementById("replay").addEventListener("click", replay);
  sync();
})();
</script>
</body>
</html>
